<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
    </head>
    <body>
        <a-scene>
            <a-camera><a-cursor></a-cursor></a-camera>
        <a-box
            position="0 1 -5"
            depth="2"
            height="2"
            width="2"
            animation="
                property: position;
                from: 0 0 0;
                to: 0 -10 -30;
                dur: 2000;
                easing: easeOutExpo;
                loop: true;
                dir: alternate;
            "
            animation__2="
            property: scale;
            from: 1 1 1;
            to: 0 0 0;
            startEvents: click;
            "
            color="tomato">
        </a-box>
        <a-plane rotation="-90 0 0" width="100" height="100" color="blue" opacity="0.5" animation__2="
            property: scale;
            from: 1 1 1;
            to: 0 0 0;
            startEvents: click;
            "></a-plane>
        <a-plane rotation="-90 0 0" width="1000" height="1000" color="black" opacity="1" position="0 -100 0" animation__2="
            property: scale;
            from: 1 1 1;
            to: 0 0 0;
            startEvents: click;
            "></a-plane>
            
        <a-cylinder color="yellow" position="0 5 -10" height="2" radius="0.5" rotation="0 0 -90 "
        animation="
        property: position;
        from: 10 -5 -10;
        to: -10 -5 -10;
        loop: true;
        easing: easeInQuad;
        dir: alternate;
        dur: 1000;
        pauseEvents: click;
        "
        animation__2="
        property: scale;
        from: 1 1 1;
        to: 0 0 0;
        startEvents: click;
        "
        ></a-cylinder>
        <a-torus position="0 -5 -10" color="green" arc="360" radius="3" radius-tubular=".2"
        animation="
        property: rotation;
        from: 0 0 0;
        to: 0 360 0;
        loop: true;
        dur: 1500;
        easing: linear;
        dir: alternate;
        "
        animation__2="
        property: scale;
        from: 1 1 1;
        to: 0 0 0;
        startEvents: click;
        "
        ></a-torus>
        
        <a-sphere color="yellow" radius="5" position="-5 10 -10"
        animation="
        property:opacity;
        from: 1;
        to: 0;
        loop: true;
        dir: alternate;
        dur: 3000;
        easing: easeInSine;
        "
        animation__2="
        property: scale;
        from: 1 1 1;
        to: 0 0 0;
        startEvents: click;
        "
        ></a-sphere>
        <a-octahedron position="0 -5 -10" color="purple"
        animation="
        property: scale;
        from:0.1 0.3 0.6;
        to: 3 3 3
        dir: alternate;
        easing: easeInOutElastic;
        loop: true;
        dur: 5000;
        "
        animation__2="
        property: scale;
        from: 1 1 1;
        to: 0 0 0;
        startEvents: click;
        "
        ></a-octahedron>
        </a-scene>
    </body>
</html>
